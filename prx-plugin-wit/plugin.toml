[plugin]
name = "voice-realtime"
version = "0.1.0"
description = "Real-time voice session configuration via xAI/OpenAI Realtime APIs"
author = "ZeroClaw"
wasm = "plugin.wasm"

[[capabilities]]
type = "tool"
name = "voice_session"
description = "Create a real-time voice session. Returns WebSocket URL, auth method, session config, and audio format for the specified provider (openai or xai)."

[permissions]
required = ["log", "config"]
optional = ["kv"]

[resources]
max_fuel = 100_000_000
max_memory_mb = 8
max_execution_time_ms = 1000

[config]

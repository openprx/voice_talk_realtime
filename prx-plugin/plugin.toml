[plugin]
name = "voice-talk-realtime"
version = "0.1.0"
description = "Real-time voice conversation via OpenAI and xAI Realtime APIs"
authors = ["ZeroClaw"]

[plugin.capabilities]
audio = true
realtime = true
tools = true

[[plugin.tools]]
name = "voice_session"
description = "Create a real-time voice session configuration. Returns WebSocket URL, auth headers, and session config for the specified provider."
parameters = [
    { name = "provider", type = "string", required = true, description = "Provider: 'openai' or 'xai'" },
    { name = "voice", type = "string", required = false, description = "Voice name. OpenAI: alloy/ash/ballad/coral/echo/sage/shimmer/verse. xAI: eve/ara/rex/sal/leo" },
    { name = "model", type = "string", required = false, description = "Model override. OpenAI default: gpt-4o-realtime-preview-2024-12-17. xAI default: grok-3-fast-realtime" },
    { name = "instructions", type = "string", required = false, description = "System instructions for the session" },
    { name = "turn_detection", type = "string", required = false, description = "Turn detection mode: 'server_vad' or 'none' (PTT)" },
]

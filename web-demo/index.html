<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Talk Realtime</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>🎙️ Voice Talk Realtime</h1>

    <!-- Config -->
    <div class="card">
      <h2>Configuration</h2>
      <div class="row">
        <label for="provider">Provider</label>
        <select id="provider">
          <option value="openai">OpenAI</option>
          <option value="xai">xAI (Grok)</option>
        </select>
      </div>
      <div class="row">
        <label for="apikey">API Key</label>
        <input type="password" id="apikey" placeholder="sk-..." />
      </div>
      <div class="row">
        <label for="model">Model</label>
        <input type="text" id="model" value="gpt-4o-realtime-preview-2024-12-17" />
      </div>
      <div class="row">
        <label for="voice">Voice</label>
        <select id="voice">
          <option value="alloy">Alloy</option>
          <option value="echo">Echo</option>
          <option value="shimmer">Shimmer</option>
        </select>
      </div>
    </div>

    <!-- Connection -->
    <div class="card">
      <h2>Connection</h2>
      <div class="row" style="justify-content:center; gap:1rem;">
        <button id="btn-connect" class="btn-primary">Connect</button>
        <button id="btn-disconnect" class="btn-danger" disabled>Disconnect</button>
      </div>
      <div id="status" style="margin-top:0.75rem;">
        <span class="dot off"></span> Disconnected
      </div>
    </div>

    <!-- Push-to-talk -->
    <div class="card">
      <h2>Audio</h2>
      <canvas id="visualizer"></canvas>
      <button id="btn-ptt" class="btn-ptt" disabled>Hold to Talk</button>
    </div>

    <!-- Transcript -->
    <div class="card">
      <h2>Transcript</h2>
      <div id="transcript"></div>
    </div>
  </div>

  <script type="module">
    // ── Voice lists per provider ──
    const VOICES = {
      openai: ['alloy', 'echo', 'shimmer', 'ash', 'coral', 'sage'],
      xai: ['tara', 'sage', 'ash', 'coral', 'ember'],
    };
    const MODELS = {
      openai: 'gpt-4o-realtime-preview-2024-12-17',
      xai: 'grok-3-fast-realtime',
    };

    const $ = id => document.getElementById(id);
    const providerEl  = $('provider');
    const apikeyEl    = $('apikey');
    const modelEl     = $('model');
    const voiceEl     = $('voice');
    const btnConnect  = $('btn-connect');
    const btnDisconn  = $('btn-disconnect');
    const btnPtt      = $('btn-ptt');
    const statusEl    = $('status');
    const transcriptEl= $('transcript');
    const canvas      = $('visualizer');
    const canvasCtx   = canvas.getContext('2d');

    let ws = null;
    let audioCtx = null;
    let workletNode = null;
    let mediaStream = null;
    let isRecording = false;
    let playbackCtx = null;
    let nextPlayTime = 0;

    // ── Provider switch ──
    providerEl.addEventListener('change', () => {
      const p = providerEl.value;
      modelEl.value = MODELS[p];
      voiceEl.innerHTML = '';
      for (const v of VOICES[p]) {
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = v.charAt(0).toUpperCase() + v.slice(1);
        voiceEl.appendChild(opt);
      }
    });
    providerEl.dispatchEvent(new Event('change'));

    // ── Status helpers ──
    function setStatus(connected, text) {
      statusEl.innerHTML = `<span class="dot ${connected ? 'on' : 'off'}"></span> ${text}`;
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = 'msg';
      div.innerHTML = `<div class="role ${role}">${role}</div><div class="text">${text}</div>`;
      transcriptEl.appendChild(div);
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    // ── WebSocket connect ──
    btnConnect.addEventListener('click', async () => {
      const provider = providerEl.value;
      const apiKey = apikeyEl.value.trim();
      const model = modelEl.value.trim();
      const voice = voiceEl.value;

      if (!apiKey) { alert('Please enter an API key'); return; }

      btnConnect.disabled = true;
      setStatus(false, 'Connecting...');

      try {
        let url, protocols;
        if (provider === 'openai') {
          url = `wss://api.openai.com/v1/realtime?model=${encodeURIComponent(model)}`;
          protocols = ['realtime', `openai-insecure-api-key.${apiKey}`, 'openai-beta.realtime-v1'];
        } else {
          url = 'wss://api.x.ai/v1/realtime';
          protocols = ['realtime', `xai-client-secret.${apiKey}`];
        }

        ws = new WebSocket(url, protocols);

        ws.onopen = () => {
          setStatus(true, 'Connected');
          btnDisconn.disabled = false;
          btnPtt.disabled = false;
          addMessage('system', `Connected to ${provider}`);

          // Send session.update
          ws.send(JSON.stringify({
            type: 'session.update',
            session: {
              modalities: ['text', 'audio'],
              voice: voice,
              input_audio_format: 'pcm16',
              output_audio_format: 'pcm16',
              instructions: 'You are a helpful voice assistant. Be concise.',
              ...(provider === 'xai' ? { model } : {}),
            }
          }));
        };

        ws.onmessage = (evt) => {
          try {
            const msg = JSON.parse(evt.data);
            handleServerEvent(msg);
          } catch (e) { /* ignore non-JSON */ }
        };

        ws.onerror = () => {
          setStatus(false, 'Connection error');
          addMessage('system', 'WebSocket error');
        };

        ws.onclose = (evt) => {
          setStatus(false, `Disconnected (${evt.code})`);
          btnConnect.disabled = false;
          btnDisconn.disabled = true;
          btnPtt.disabled = true;
          ws = null;
        };

      } catch (e) {
        setStatus(false, 'Failed to connect');
        btnConnect.disabled = false;
        addMessage('system', `Error: ${e}`);
      }
    });

    btnDisconn.addEventListener('click', () => {
      if (ws) ws.close();
    });

    // ── Server event handler ──
    let currentTranscript = '';

    function handleServerEvent(msg) {
      switch (msg.type) {
        case 'session.created':
        case 'session.updated':
          addMessage('system', `Session ${msg.type.split('.')[1]}`);
          break;
        case 'response.audio.delta':
        case 'response.output_audio.delta':
          playAudioChunk(msg.delta);
          break;
        case 'response.audio_transcript.delta':
        case 'response.output_audio_transcript.delta':
          currentTranscript += msg.delta || '';
          updateLastAssistant(currentTranscript);
          break;
        case 'response.text.delta':
          currentTranscript += msg.delta || '';
          updateLastAssistant(currentTranscript);
          break;
        case 'response.done':
          if (currentTranscript) {
            currentTranscript = '';
          }
          break;
        case 'error':
          const errMsg = typeof msg.error === 'string' ? msg.error :
            (msg.error?.message || JSON.stringify(msg.error));
          addMessage('system', `Error: ${errMsg}`);
          break;
      }
    }

    function updateLastAssistant(text) {
      let last = transcriptEl.querySelector('.msg:last-child');
      if (last && last.querySelector('.role.assistant')) {
        last.querySelector('.text').textContent = text;
      } else {
        addMessage('assistant', text);
      }
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    // ── Audio playback ──
    function playAudioChunk(b64) {
      if (!b64) return;
      if (!playbackCtx) {
        playbackCtx = new AudioContext({ sampleRate: 24000 });
        nextPlayTime = 0;
      }

      const raw = atob(b64);
      const buf = new ArrayBuffer(raw.length);
      const view = new Uint8Array(buf);
      for (let i = 0; i < raw.length; i++) view[i] = raw.charCodeAt(i);

      const pcm16 = new Int16Array(buf);
      const float32 = new Float32Array(pcm16.length);
      for (let i = 0; i < pcm16.length; i++) float32[i] = pcm16[i] / 32768;

      const audioBuf = playbackCtx.createBuffer(1, float32.length, 24000);
      audioBuf.copyToChannel(float32, 0);

      const source = playbackCtx.createBufferSource();
      source.buffer = audioBuf;
      source.connect(playbackCtx.destination);

      const now = playbackCtx.currentTime;
      const startAt = nextPlayTime > now ? nextPlayTime : now;
      source.start(startAt);
      nextPlayTime = startAt + float32.length / 24000;

      // Visualize
      drawVisualization(float32);
    }

    // ── Audio capture (Push-to-talk) ──
    async function startRecording() {
      if (isRecording) return;
      isRecording = true;
      btnPtt.classList.add('active');
      btnPtt.textContent = '🔴 Recording...';
      addMessage('user', '🎤 (speaking...)');

      try {
        audioCtx = new AudioContext({ sampleRate: 24000 });
        await audioCtx.audioWorklet.addModule('js/audio_worklet.js');

        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = audioCtx.createMediaStreamSource(mediaStream);
        workletNode = new AudioWorkletNode(audioCtx, 'pcm-capture-processor');

        workletNode.port.onmessage = (evt) => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
              type: 'input_audio_buffer.append',
              audio: evt.data
            }));
          }
        };

        source.connect(workletNode);
      } catch (e) {
        addMessage('system', `Mic error: ${e.message}`);
        stopRecording();
      }
    }

    function stopRecording() {
      isRecording = false;
      btnPtt.classList.remove('active');
      btnPtt.textContent = 'Hold to Talk';

      if (workletNode) { workletNode.disconnect(); workletNode = null; }
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
      if (audioCtx) { audioCtx.close(); audioCtx = null; }

      // Commit audio and request response
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'input_audio_buffer.commit' }));
        ws.send(JSON.stringify({ type: 'response.create', response: {} }));
      }
    }

    // PTT events (mouse + touch)
    btnPtt.addEventListener('mousedown', (e) => { e.preventDefault(); startRecording(); });
    btnPtt.addEventListener('mouseup', stopRecording);
    btnPtt.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });
    btnPtt.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
    btnPtt.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });

    // ── Visualization ──
    function drawVisualization(samples) {
      const w = canvas.width = canvas.offsetWidth * devicePixelRatio;
      const h = canvas.height = canvas.offsetHeight * devicePixelRatio;
      canvasCtx.clearRect(0, 0, w, h);

      canvasCtx.strokeStyle = '#6366f1';
      canvasCtx.lineWidth = 2;
      canvasCtx.beginPath();

      const step = Math.max(1, Math.floor(samples.length / w));
      for (let i = 0; i < w; i++) {
        const idx = i * step;
        const val = idx < samples.length ? samples[idx] : 0;
        const y = (1 - val) * h / 2;
        if (i === 0) canvasCtx.moveTo(i, y);
        else canvasCtx.lineTo(i, y);
      }
      canvasCtx.stroke();
    }
  </script>
</body>
</html>
